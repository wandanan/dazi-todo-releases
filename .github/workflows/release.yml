name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Install dependencies
        run: cd core/frontend && npm install

      - name: Build Release
        run: python core/release.py

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dazi-todo-windows
          path: app/

      - name: Create Windows ZIP
        run: Compress-Archive -Path app\* -DestinationPath dazi-todo-windows.zip

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dazi-todo-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: cd core/frontend && npm install

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Build CLI
        run: cd core/cli-rs && cargo build --release --target ${{ matrix.target }}

      - name: Build Tauri App
        run: cd core && cargo tauri build --target ${{ matrix.target }}

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dazi-todo-macos-${{ matrix.target }}
          path: |
            core/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            core/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: core/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4

      - name: Display Artifacts
        run: ls -R
